<style>
:root{--bg:#03070f;--bg2:#070d1a;--bg3:#0b1221;--border:#0f1f35;--border2:#162840;--green:#00ff88;--blue:#0088ff;--orange:#f97316;--purple:#a78bfa;--pink:#f472b6;--yellow:#f59e0b;--text:#c8d8e8;--text2:#4a6080;--text3:#1e3050;--mono:'Space Mono',monospace;--display:'Bebas Neue',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,136,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.02) 1px,transparent 1px);background-size:48px 48px}

.corner{position:fixed;width:44px;height:44px;z-index:5;pointer-events:none;border-color:rgba(0,255,136,.12);border-style:solid}
.c-tl{top:10px;left:10px;border-width:1px 0 0 1px}.c-tr{top:10px;right:10px;border-width:1px 1px 0 0}
.c-bl{bottom:10px;left:10px;border-width:0 0 1px 1px}.c-br{bottom:10px;right:10px;border-width:0 1px 1px 0}
#root{position:relative;z-index:10;max-width:1280px;margin:0 auto;padding:24px 18px 60px}
/* HEADER */
.hdr{margin-bottom:24px}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}

@keyframes pa{0%,100%{box-shadow:0 0 6px var(--green)}50%{box-shadow:0 0 22px var(--green)}}
.e-txt{font-size:10px;letter-spacing:.35em;color:var(--green);text-transform:uppercase}
.title{font-family:var(--display);font-size:clamp(42px,8vw,96px);line-height:.9;letter-spacing:.02em;background:linear-gradient(135deg,#fff 0%,#a8c8e8 40%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{margin-top:8px;font-size:11px;color:var(--text2);letter-spacing:.1em;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

.rb:disabled{background:var(--border2);color:var(--green);border:1px solid rgba(0,255,136,.2);cursor:not-allowed;transform:none}

.fld{display:flex;flex-direction:column;gap:5px}.fld label{font-size:10px;letter-spacing:.1em;color:var(--text2);text-transform:uppercase}

/* ALERTS */

.a-ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.22);color:var(--green)}
.a-e{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.22);color:#f66}
/* SELECT */
.sel{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;cursor:pointer;width:100%}
/* CALCULATOR */
.csl{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:linear-gradient(to right,var(--green) 0%,var(--green) var(--pct,50%),var(--border2) var(--pct,50%));outline:none;cursor:pointer}
.csl::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green);cursor:pointer}
.co{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
@media(max-width:500px){.co{grid-template-columns:1fr 1fr}}
.cc{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}

.ch{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2)}.ch .cv{color:var(--green)}
/* MULTI-AGENT */
.mag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}

.mab{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;text-align:left;transition:all .2s;position:relative}

<body>
<div id="scanline"></div>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>
<div id="root"></div>

<script>
'use strict';


// ═══════════════════════════════════════════════════
// MODULE: prices.js
// ═══════════════════════════════════════════════════
// Live price data — fetched from DeFiLlama
var PRICE_CACHE={};
var PRICE_LOADING=false;




// Inject live prices into trading agent system prompt
function getTradingSysWithPrices(){
  var base=S.agent.sys;
  if(S.agent.id!=='trading'||!PRICE_CACHE.ETH)return base;
  var priceCtx='\n\nLIVE MARKET DATA (fetched just now):\n'+
    'ETH price: $'+PRICE_CACHE.ETH.toFixed(2)+'\n'+
    'BTC price: $'+Math.round(PRICE_CACHE.BTC).toLocaleString()+'\n'+
    'USDC peg: $'+PRICE_CACHE.USDC.toFixed(4)+'\n'+
    'AERO price: $'+PRICE_CACHE.AERO.toFixed(4)+'\n'+
    'Data timestamp: '+new Date(PRICE_CACHE.ts).toISOString()+'\n'+
    'Use these REAL prices in your analysis. Do not use placeholder prices.';
  return base+priceCtx;
}

// Inject live prices into research prompt
function getResearchSysWithPrices(){
  var base=S.agent.sys;
  if(S.agent.id!=='research'||!PRICE_CACHE.ETH)return base;
  var priceCtx='\n\nLIVE DEFI DATA (fetched just now):\n'+
    'ETH price: $'+PRICE_CACHE.ETH.toFixed(2)+'\n'+
    'AERO price: $'+PRICE_CACHE.AERO.toFixed(4)+'\n'+
    'MORPHO price: $'+PRICE_CACHE.MORPHO.toFixed(4)+'\n'+
    'COMP price: $'+PRICE_CACHE.COMP.toFixed(4)+'\n'+
    'Use these real prices for TVL calculations and yield analysis.';
  return base+priceCtx;
}

// Auto-refresh prices every 60s
setInterval(function(){
  if(PRICE_CACHE.ts&&Date.now()-PRICE_CACHE.ts<60000)return;
  fetchPrices();
},30000);


// -- Live Price Data ------------------------------------------

async function fetchPrices(){
  if(PRICE_LOADING)return;
  PRICE_LOADING=true;
  try{
    // DeFiLlama prices API — free, no API key, CORS-friendly
    var r=await fetch('https://coins.llama.fi/prices/current/coingecko:ethereum,coingecko:bitcoin,coingecko:usd-coin,coingecko:aerodrome-finance,coingecko:morpho-protocol,coingecko:compound-governance-token',{
      headers:{'Accept':'application/json'}
    });
    if(!r.ok)throw new Error('Price fetch failed');
    var d=await r.json();
    var coins=d.coins||{};
    var newEth=(coins['coingecko:ethereum']||{}).price||0;
    if(!PRICE_CACHE.ethHistory)PRICE_CACHE.ethHistory=[];
    if(newEth>0){PRICE_CACHE.ethHistory.push(newEth);if(PRICE_CACHE.ethHistory.length>200)PRICE_CACHE.ethHistory.shift();}
    PRICE_CACHE={
      ethHistory:PRICE_CACHE.ethHistory,
      ETH:  newEth,
      BTC:  (coins['coingecko:bitcoin']||{}).price||0,
      USDC: (coins['coingecko:usd-coin']||{}).price||1,
      AERO: (coins['coingecko:aerodrome-finance']||{}).price||0,
      COMP: (coins['coingecko:compound-governance-token']||{}).price||0,
      MORPHO:(coins['coingecko:morpho-protocol']||{}).price||0,
      ts: Date.now(),

var typerIv=null;
function startTyping(text){
  S.out=text;S.typing='';clearInterval(typerIv);var i=0;
  typerIv=setInterval(function(){
    i+=4;S.typing=text.slice(0,i);
    var el=document.getElementById('outText');
    if(el){
      // Use markdown rendering for final output, plain text while typing for speed
      if(i>=text.length){
        el.innerHTML=renderMd(text);
        var cur=document.getElementById('typeCursor');if(cur)cur.remove();
      } else {
        el.textContent=S.typing;
        var cur=document.getElementById('typeCursor');
        if(!cur){cur=document.createElement('span');cur.id='typeCursor';cur.className='cb';cur.textContent='\u2588';el.parentNode.appendChild(cur);}
      }
      el.parentNode.scrollTop=el.parentNode.scrollHeight;
    }
    if(i>=text.length)clearInterval(typerIv);

}

// -- Run Agent -----------------------------------------
async function runAgent(){
  if(S.running)return;
  S.running=true;S.logs=[];S.out='';S.typing='';
  var rb=document.getElementById('runBtn');
  if(rb){rb.disabled=true;rb.innerHTML='<span class="spin"></span> RUNNING';}
  var lp=document.getElementById('logPane'),op=document.getElementById('outPane');
  if(lp){lp.innerHTML='<div class="ph">Execution Log</div>';}
  if(op){op.innerHTML='<div class="ph">Agent Output</div><div class="em">Generating...</div>';}

  var cost=0.002+Math.random()*0.008, funded=cost*0.3;
  var a=S.agent, m=S.model;
  var prompt=S.customPrompt.trim()||a.usr;
  // Inject live price data into trading agent context
  var liveCtx='';
  if(a.id==='trading'&&PRICES.eth>0){
    liveCtx='\n\nLIVE MARKET DATA (fetched now):\nETH/USD: '+fmtPrice(PRICES.eth)+'\nBTC/USD: '+fmtPrice(PRICES.btc)+'\nData source: DeFiLlama\nTimestamp: '+new Date().toUTCString();
  }
  var memCtx=S.memory.filter(function(x){return x.agentId===a.id;}).slice(-2).map(function(x){return '[Prev] Q:'+x.prompt+'\nA:'+x.response.slice(0,200)+'...';}).join('\n\n');
  var liveSys=(a.id==='trading'?getTradingSysWithPrices():(a.id==='research'?getResearchSysWithPrices():a.sys));
  var fullSys=memCtx?liveSys+'\n\nContext:\n'+memCtx:liveSys;

  addLog('\u25B6 '+a.label+' \u2192 '+m.label,'sys');
  await sleep(250);
  addLog('\u27F3 POST /api/chat \u2192 llm.bankr.bot','req');
  await sleep(400);

  var resp='';
  if(S.key&&S.key!=='demo'){
    var maxRetries=3, lastErr='';
    for(var attempt=1;attempt<=maxRetries;attempt++){
      try{
        if(attempt>1){addLog('⟳ Retry '+attempt+'/'+maxRetries+'...','warn');await sleep(attempt*800);}
        var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json','X-API-Key':S.key},
          body:JSON.stringify({model:m.id,max_tokens:1200,messages:[{role:'system',content:fullSys},{role:'user',content:prompt}]})});
        if(!r.ok){
          var e=await r.json().catch(function(){return{};});
          var em=typeof e.error==='string'?e.error:typeof e.error==='object'?JSON.stringify(e.error):e.message||'Failed';
          lastErr=r.status+': '+em+(r.status===402?' — Top up at bankr.bot/llm':'');
          if(r.status===402||r.status===401||r.status===403){addLog('✗ '+lastErr,'err');break;}
          addLog('⚠ Attempt '+attempt+' failed: '+lastErr.slice(0,60),'warn');
          if(attempt===maxRetries){addLog('↩ All retries failed — demo fallback','err');resp=DEMOS[a.id];}
          continue;
        }
        var d=await r.json();
        resp=d&&d.choices&&d.choices[0]&&d.choices[0].message?d.choices[0].message.content:'';
        var u=d&&d.usage?d.usage:{};
        addLog('✓ 200 OK'+(attempt>1?' (retry '+attempt+')':'')+' — '+(u.prompt_tokens||'?')+' in / '+(u.completion_tokens||'?')+' out','ok');
        break;
      }catch(ex){
        lastErr=ex.message;
        addLog('⚠ Network error (attempt '+attempt+'): '+ex.message.slice(0,50),'warn');
        if(attempt===maxRetries){addLog('↩ Gateway unreachable — demo fallback','err');resp=DEMOS[a.id];}
      }
    }
  }

  addLog('\u25C8 Cost: $'+cost.toFixed(4)+' | Fee-funded: $'+funded.toFixed(4),'eco');
  await sleep(300);
  var tx='0x'+r16(40);addLog('\u29A1 Tx: '+tx.slice(0,18)+'... (Base)','tx');
  await sleep(200);addLog('\u2713 Queued on Base chain','ok');


  // Save to run history
  // (run history saved below with full data)
  S.memory.unshift({agentId:a.id,agentLabel:a.label,agentIcon:a.icon,prompt:prompt,response:resp,ts:new Date()});
  if(S.memory.length>20)S.memory.pop();
  S.txHistory.unshift({icon:'\u27F3',desc:'Agent: '+a.label,time:new Date(),amount:'-$'+cost.toFixed(4),hash:tx,status:'ok'});
  S.stats.calls++;S.stats.cost+=cost;S.stats.funded+=funded;S.stats.txs++;
  // Save to run history
  if(!S.runHistory)S.runHistory=[];
  // Parse entry/exit from output to track position
  var entryPrice=0, isBuy=false, isSell=false;
  if(resp){
    var buyMatch=resp.match(/\[ENTRY\]\s*\$([\d,\.]+)/);
    var sellMatch=resp.match(/exit|close|sell/i);
    if(buyMatch){entryPrice=parseFloat(buyMatch[1].replace(/,/g,''));isBuy=true;}
    if(sellMatch&&!isBuy){isSell=true;}
  }
  // Update equity curve (append current portfolio snapshot)
  var portfolioVal=parseFloat(S.wallet.usdc||0)+parseFloat(S.wallet.eth||0)*(PRICE_CACHE.ETH||3400);
  if(portfolioVal>0){
    S.equityCurve.push({ts:Date.now(),val:portfolioVal,cost:S.pnlStats.totalInferenceCost});
    if(S.equityCurve.length>200)S.equityCurve.shift();
  }
  // Update P&L stats
  S.pnlStats.totalInferenceCost+=(cost||0);
  S.pnlStats.trades++;
  // Open position if entry detected
  if(isBuy&&entryPrice>0&&a.id==='trading'){
    S.positions.push({
      id:Date.now(),agentId:a.id,symbol:'ETH',
      entry:entryPrice,entryTs:new Date().toISOString(),
      size:parseFloat(S.launch&&S.launch.feeVal||'100')||100,
      stopPrice:entryPrice*0.954, // 5.5x ATR approx
      status:'open',pnl:0,cost:cost
    });
  }
  S.runHistory.unshift({
    id:Date.now(),ts:new Date().toISOString(),
    agentId:a.id,agentLabel:a.label,agentIcon:a.icon,agentColor:a.c,
    modelId:m.id,modelLabel:m.label,
    prompt:prompt.slice(0,120),output:resp,
    cost:cost,funded:funded,tx:tx,
    entryPrice:entryPrice,isBuy:isBuy
  });
  if(S.runHistory.length>50)S.runHistory.pop();
  S.running=false;
  saveState();

  var rb2=document.getElementById('runBtn');if(rb2){rb2.disabled=false;rb2.innerHTML='\u25B6 EXECUTE';}
  updateStats();
  if(op){op.innerHTML='<div class="ph">Agent Output <button onclick="copyOutput()" style="margin-left:auto;background:none;border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:2px 10px;font-size:9px;font-family:var(--mono);cursor:pointer" onmouseover="this.style.borderColor=\'var(--green)\';this.style.color=\'var(--green)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--text2)\'" id="copyBtn">COPY</button></div><div class="ot" id="outText"></div>';}
  startTyping(resp);

  // refresh memory display if visible
  var mlistEl=document.getElementById('memList');
  if(mlistEl)renderMemList();
}

      }catch(ex){resp=DEMOS[S.agent.id]||'Error: '+ex.message;}

async function runBacktest(){
  if(S.backtestRunning)return;
  S.backtestRunning=true;S.backtestResult=null;renderPage();

  try{
    // Fetch 500 hourly candles for ETH from CryptoCompare (free, no key)
    addLog('Fetching 500h of ETH/USDC history...','req');
    var r=await fetch('https://min-api.cryptocompare.com/data/v2/histohour?fsym=ETH&tsym=USDC&limit=499',{
      headers:{'Accept':'application/json'}
    });
    var raw=r.ok?await r.json():null;
    var candles=(raw&&raw.Data&&raw.Data.Data)||[];

    if(candles.length<50){
      // Fallback: generate synthetic candles based on current price
      var basePrice=PRICE_CACHE.ETH||3400;
      candles=[];
      var ts=Date.now()/1000-500*3600;
      var p=basePrice*0.92;
      for(var i=0;i<500;i++){
        p*=(1+(Math.random()-0.49)*0.012);
        candles.push({time:ts+i*3600,open:p,high:p*(1+Math.random()*0.006),low:p*(1-Math.random()*0.006),close:p,volumeto:p*1000+Math.random()*500000});
      }
    }

    addLog('Running Nunchi 6-signal strategy on '+candles.length+' candles...','sys');
    var result=runStrategyBacktest(candles, S.tunerParams);
    S.backtestResult=result;
    addLog('Backtest complete: Sharpe '+result.sharpe+', '+result.trades+' trades','ok');
  }catch(e){
    S.backtestResult={error:e.message};
    addLog('Backtest error: '+e.message,'err');
  }

  S.backtestRunning=false;saveState();renderPage();
}

function runStrategyBacktest(candles, customParams){
  var _p=customParams||{rsiPeriod:8,atrMult:5.5,minVotes:4,posPct:8,cooldown:2};
  var prices=candles.map(function(c){return c.close;});
  var capital=10000, equity=[capital], trades=[], position=0;
  var entryPrice=0, entryIdx=0, cooldown=0;
  var BASE_POS=(_p.posPct||8)/100, ATR_MULT=_p.atrMult||5.5, RSI_PERIOD=_p.rsiPeriod||8, MIN_VOTES=_p.minVotes||4;
  var COOLDOWN_INIT=_p.cooldown||2;

  function ema(arr,p,i){
    var k=2/(p+1),e=arr[Math.max(0,i-p*3)];
    for(var j=Math.max(0,i-p*3);j<=i;j++)e=arr[j]*k+e*(1-k);
    return e;
  }
  function rsi(arr,p,i){
    if(i<p+1)return 50;
    var g=0,l=0;
    for(var j=i-p;j<i;j++){var d=arr[j+1]-arr[j];d>0?g+=d:l-=d;}
    var rs=(g/p)/(l/p||0.001);return 100-100/(1+rs);
  }
  function atr(candles,p,i){
    if(i<p)return candles[i].close*0.01;
    var sum=0;
    for(var j=i-p;j<i;j++){sum+=Math.max(candles[j].high-candles[j].low,Math.abs(candles[j].high-(j>0?candles[j-1].close:candles[j].open)),Math.abs(candles[j].low-(j>0?candles[j-1].close:candles[j].open)));}
    return sum/p;
  }
  function bbwidth(arr,p,i){
    if(i<p)return 0;
    var sl=arr.slice(i-p,i),mean=sl.reduce(function(a,b){return a+b;},0)/p;
    var std=Math.sqrt(sl.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/p);
    return std*2/mean*100;
  }

  var peak=capital, maxDD=0, wins=0, losses=0;
  var stopPrice=0;

  for(var i=30;i<prices.length;i++){
    var p=prices[i];

    // Compute signals
    var mom12=i>=12?(p-prices[i-12])/prices[i-12]*100:0;
    var mom6=i>=6?(p-prices[i-6])/prices[i-6]*100:0;
    var dynT=1.5;
    var e7=ema(prices,7,i),e26=ema(prices,26,i);
    var r8=rsi(prices,RSI_PERIOD,i);
    var macdHist=ema(prices,14,i)-ema(prices,23,i);
    var bbw=bbwidth(prices,20,i);
    var bbwHist=[];
    for(var k=Math.max(0,i-100);k<i;k++)bbwHist.push(bbwidth(prices,20,k));
    var bbwPct=bbwHist.length?bbwHist.filter(function(x){return x<=bbw;}).length/bbwHist.length*100:50;

    var bullVotes=(mom12>dynT?1:0)+(mom6>dynT*0.7?1:0)+(e7>e26?1:0)+(r8>50?1:0)+(macdHist>0?1:0)+(bbwPct<85?1:0);
    var bearVotes=(mom12<-dynT?1:0)+(mom6<-dynT*0.7?1:0)+(e7<e26?1:0)+(r8<50?1:0)+(macdHist<0?1:0)+(bbwPct<85?1:0);

    var atr14=atr(candles,14,i);

    // Exit logic
    if(position!==0){
      var hitStop=(position>0&&p<=stopPrice)||(position<0&&p>=stopPrice);
      var rsiExit=(position>0&&r8>69)||(position<0&&r8<31);
      var flipExit=(position>0&&bearVotes>=4)||(position<0&&bullVotes>=4);
      if(hitStop||rsiExit||flipExit){
        var pnl=position*(p-entryPrice)/entryPrice*capital*BASE_POS;
        capital+=pnl;
        if(pnl>0)wins++;else losses++;
        trades.push({entry:entryPrice,exit:p,pnl:pnl,bars:i-entryIdx,reason:hitStop?'stop':rsiExit?'rsi':'flip'});
        position=0;cooldown=COOLDOWN_INIT;
      }
    }

    // Entry logic
    if(position===0&&cooldown<=0){
      if(bullVotes>=MIN_VOTES){
        position=1;entryPrice=p;entryIdx=i;
        stopPrice=p-ATR_MULT*atr14;
      }else if(bearVotes>=MIN_VOTES){
        position=-1;entryPrice=p;entryIdx=i;
        stopPrice=p+ATR_MULT*atr14;
      }
    }
    if(cooldown>0)cooldown--;

    equity.push(capital);
    if(capital>peak)peak=capital;
    var dd=(peak-capital)/peak*100;
    if(dd>maxDD)maxDD=dd;
  }

  // Sharpe
  var returns=[];
  for(var i=1;i<equity.length;i++)returns.push((equity[i]-equity[i-1])/equity[i-1]);
  var meanR=returns.reduce(function(a,b){return a+b;},0)/returns.length;
  var stdR=Math.sqrt(returns.reduce(function(a,b){return a+(b-meanR)*(b-meanR);},0)/returns.length);
  var sharpe=stdR>0?(meanR/stdR*Math.sqrt(365*24)).toFixed(2):'N/A';

  return{
    equity:equity,trades:trades.length,wins:wins,losses:losses,
    totalReturn:((capital-10000)/10000*100).toFixed(2),
    maxDD:maxDD.toFixed(2),sharpe:sharpe,
    finalCapital:capital.toFixed(2),
    startCapital:10000,
    candles:prices.length,
    avgTradeDuration:trades.length>0?(trades.reduce(function(a,b){return a+b.bars;},0)/trades.length).toFixed(1):0,
    winRate:trades.length>0?(wins/trades.length*100).toFixed(0):0,
    recentTrades:trades.slice(-10)
  };
}

function addAlert(){

  var isSignal=type.value.startsWith('signal')||type.value.startsWith('rsi');
  var numVal=isSignal?0:parseFloat(val&&val.value||0);
  if(!isSignal&&(isNaN(numVal)||numVal<=0)){alert('Enter a valid price');return;}

  var labels={
    price_above:'Price above $'+numVal,
    price_below:'Price below $'+numVal,
    signal_bull:'Bull signal 4/6 aligned',
    signal_bear:'Bear signal 4/6 aligned',
    rsi_overbought:'RSI(8) > 69 — exit long',
    rsi_oversold:'RSI(8) < 31 — exit short'
  };

  if(!S.alerts)S.alerts=[];
  S.alerts.push({
    id:Date.now(),type:type.value,sym:sym.value,
    value:numVal,label:labels[type.value]||type.value,
    active:true,triggered:false,triggeredAt:null

  if(val)val.value='';
  saveState();renderPage();
}

var alertMonitorInterval=null;
function startAlertMonitor(){
  if(alertMonitorInterval)clearInterval(alertMonitorInterval);
  if(!S.alertsEnabled)return;
  alertMonitorInterval=setInterval(checkAlerts,30000);
  checkAlerts(); // immediate first check
}

function checkAlerts(){
  if(!S.alerts||!S.alertsEnabled)return;
  var eth=PRICE_CACHE.ETH||0,btc=PRICE_CACHE.BTC||0;
  var signals=computeSignals(eth,PRICE_CACHE.ethHistory||[]);
  var bullVotes=signals.filter(function(s){return s.vote==='BULL';}).length;
  var bearVotes=signals.filter(function(s){return s.vote==='BEAR';}).length;
  var rsi8=signals[3]?parseFloat(signals[3].value.replace('RSI: ','')):50;

  var anyTriggered=false;
  S.alerts.forEach(function(al){
    if(al.triggered||!al.active)return;
    var price=al.sym==='BTC'?btc:eth;
    var triggered=false;
    if(al.type==='price_above'&&price>=al.value)triggered=true;
    if(al.type==='price_below'&&price<=al.value)triggered=true;
    if(al.type==='signal_bull'&&bullVotes>=4)triggered=true;
    if(al.type==='signal_bear'&&bearVotes>=4)triggered=true;
    if(al.type==='rsi_overbought'&&rsi8>69)triggered=true;
    if(al.type==='rsi_oversold'&&rsi8<31)triggered=true;

    if(triggered){
      al.triggered=true;al.triggeredAt=Date.now();
      anyTriggered=true;
      // Browser notification
      if('Notification' in window&&Notification.permission==='granted'){
        new Notification('bankrOS Alert: '+al.label,{
          body:al.sym+' price: $'+(al.sym==='BTC'?Math.round(btc).toLocaleString():eth.toFixed(2)),
          icon:'/icon-192.png'
        });
      }
      // Webhook notification
      if(S.webhook&&S.webhook.enabled&&S.webhook.url){
        sendWebhook('Alert: '+al.label,'Alert triggered for '+al.sym+'\nCurrent price: $'+(al.sym==='BTC'?Math.round(btc):eth.toFixed(2))+'\nSignals: '+bullVotes+'/6 bull, '+bearVotes+'/6 bear',0);
      }
    }
  });

  if(anyTriggered){saveState();renderPage();}
}

// ── Direction A: Rolling Metrics (live stats bar) ─────────
function computeRollingMetrics(){
  var hist=S.runHistory||[];
  if(!hist.length)return;
  var tradingRuns=hist.filter(function(r){return r.agentId==='trading';});
  if(!tradingRuns.length)return;

  // Rolling Sharpe from P&L
  var pnls=(S.pnlStats&&S.pnlStats.rollingPnl)||[];
  if(pnls.length>5){
    var vals=pnls.map(function(p){return p.pnl;});
    var mean=vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var std=Math.sqrt(vals.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/vals.length);
    S.rollingMetrics.sharpe=std>0?(mean/std*Math.sqrt(365)).toFixed(2):'N/A';
  }

  S.rollingMetrics.winRate=S.pnlStats&&S.pnlStats.trades>0?
    (S.pnlStats.wins/S.pnlStats.trades*100).toFixed(0):'—';
  S.rollingMetrics.totalTrades=tradingRuns.length;

  // Streak
  var streak=0,lastWin=null;
  for(var i=0;i<Math.min(pnls.length,10);i++){
    var isWin=pnls[pnls.length-1-i].pnl>0;
    if(i===0){lastWin=isWin;streak=1;}
    else if(isWin===lastWin)streak++;
    else break;
  }
  S.rollingMetrics.streak=(lastWin?'+':'-')+streak;
}

// Inject rolling metrics bar into agents page
function buildRollingMetricsBar(){
  computeRollingMetrics();
  var m=S.rollingMetrics;
  if(!m||!S.pnlStats||!S.pnlStats.trades)return '';
  var net=(S.pnlStats.totalPnl||0)-(S.pnlStats.totalInferenceCost||0);
  return '<div style="display:flex;gap:12px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:10px">'
    +'<span style="color:var(--text3);letter-spacing:.1em">LIVE METRICS</span>'
    +'<span>Sharpe <b style="color:var(--purple)">'+m.sharpe+'</b></span>'
    +'<span>Win Rate <b style="color:'+(parseInt(m.winRate)>=50?'var(--green)':'#f87171')+'">'+m.winRate+'%</b></span>'
    +'<span>Net P&amp;L <b style="color:'+(net>=0?'var(--green)':'#f87171')+'">'+(net>=0?'+':'')+'$'+net.toFixed(4)+'</b></span>'
    +'<span>Streak <b style="color:var(--yellow)">'+m.streak+'</b></span>'
    +'<span style="margin-left:auto;color:var(--text3)">'+m.totalTrades+' trades</span>'
    +'</div>';
}

  var html='<div class="card"><div class="ctitle">Strategy Registry <span style="color:var(--text3);font-size:9px;margin-left:6px">save, compare, promote strategies</span></div>'

      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+(isActive?'var(--green)':'var(--text3)')+';'+(isActive?'box-shadow:0 0 8px var(--green)':'')+'"></div>'+

      '</div>'+
      '<div style="display:flex;gap:8px">'+
      (isActive?'<span class="badge bok">&#x25CF; ACTIVE</span>':

      '<button class="btn btn-o btn-s" onclick="loadStrategyToTuner(\''+strat.id+'\')">&#x29B7; TUNE</button>'+

  // Comparison chart if experiments have results
  var backtested=all.filter(function(s){return s.backtestSharpe;});

    html+='<div style="display:grid;grid-template-columns:repeat('+Math.min(backtested.length,4)+',1fr);gap:8px;margin-bottom:12px">';

  html+='<div style="text-align:center;padding:14px">'+
    '<button class="btn btn-o" onclick="setPage(\'tuner\')">&#x2B25; Create New Strategy via Tuner</button>'+
    '</div></div>';

  // Experiment log
  if(experiments.length){

    html+='<div style="display:flex;flex-direction:column;gap:5px">';

        '<span style="color:var(--text2);flex:1">'+esc(exp.name)+'</span>'+
        '<span style="color:var(--purple)">'+exp.sharpe+'</span>'+
        '<span style="color:var(--yellow)">DD '+exp.dd+'%</span>'+
        '<span style="color:var(--text3)">'+new Date(exp.ts).toLocaleDateString()+'</span>'+
        '</div>';
    });
    html+='</div></div>';
  }

  return html;
}

function activateStrategy(id){
  S.activeStrategyId=id;
  var strat=getActiveStrategy();
  if(strat&&strat.params)S.tunerParams=Object.assign({},strat.params);
  saveState();renderPage();
}

function deleteStrategy(id){
  if(!S.strategies)return;
  S.strategies=S.strategies.filter(function(s){return s.id!==id;});
  if(S.activeStrategyId===id)S.activeStrategyId='nunchi-exp102';
  saveState();renderPage();
}

async function backtestStrategy(id){
  var strat=getAllStrategies().find(function(s){return s.id===id;});
  if(!strat)return;
  var origParams=Object.assign({},S.tunerParams);
  S.tunerParams=Object.assign({},strat.params);
  S.backtestRunning=true;S.backtestResult=null;
  setPage('backtest');
  await runBacktest();
  // Save result to strategy
  if(S.backtestResult&&!S.backtestResult.error){
    strat.backtestSharpe=S.backtestResult.sharpe;
    strat.backtestDD=S.backtestResult.maxDD;
    strat.backtestReturn=S.backtestResult.totalReturn;
    saveState();
  }
  S.tunerParams=origParams;
}

function loadStrategyToTuner(id){
  var strat=getAllStrategies().find(function(s){return s.id===id;});
  if(!strat)return;
  S.tunerParams=Object.assign({},strat.params);
  saveState();
  setPage('tuner');
}

// ── Parameter Tuner Page ──────────────────────────────────
function buildTunerPage(){
  var p=S.tunerParams||{rsiPeriod:8,atrMult:5.5,minVotes:4,posPct:8,cooldown:2};

    {id:'cooldown',label:'Cooldown Bars',min:0,max:6,step:1,val:p.cooldown,note:'2 bars = Nunchi optimal. Prevents overtrading after exit',unit:'h'},
  ];

  sliders.forEach(function(sl){
    var pct=(sl.val-sl.min)/(sl.max-sl.min)*100;

  html+='</div>';

  // Actions
  html+='<div class="irow">'
    +'<button class="btn btn-g" onclick="runTunerBacktest()">&#x29BE; TEST THESE PARAMS</button>'
    +'<button class="btn btn-o" onclick="resetTuner()">&#x27F3; RESET TO exp102</button>'
    +'</div>';

  // Save as new strategy
  html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:12px">'

    +'<button class="btn btn-g btn-s" onclick="saveCurrentAsStrategy()">&#x2B25; SAVE</button>'
    +'</div></div>';

  // Show comparison to exp102
  html+='<div style="margin-top:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;font-size:10px">';

function updateTuner(key,val,unit,min,max){
  if(!S.tunerParams)S.tunerParams={rsiPeriod:8,atrMult:5.5,minVotes:4,posPct:8,cooldown:2};
  S.tunerParams[key]=val;
  var el=document.getElementById('tv-'+key);
  if(el)el.textContent=val+unit;
  var sl=document.querySelector('[oninput*="'+key+'"]');
  if(sl){
    var pct=(val-min)/(max-min)*100;
    sl.style.setProperty('--pct',pct+'%');
  }
}

function resetTuner(){
  S.tunerParams={rsiPeriod:8,atrMult:5.5,minVotes:4,posPct:8,cooldown:2};
  saveState();renderPage();
}

async function runTunerBacktest(){
  // Run backtest with current tuner params
  S.backtestRunning=true;S.backtestResult=null;
  setPage('backtest');
  await runBacktest();
  // Record as experiment
  if(S.backtestResult&&!S.backtestResult.error){
    var p=S.tunerParams;
    var prevBest=S.experiments.length?Math.max.apply(null,S.experiments.map(function(e){return parseFloat(e.sharpe)||0;})):2.7;
    var improved=parseFloat(S.backtestResult.sharpe)>prevBest;
    var exp={
      id:'exp-'+Date.now(),
      name:'RSI'+p.rsiPeriod+' ATR'+p.atrMult+' V'+p.minVotes+'/6 P'+p.posPct+'%',
      params:Object.assign({},p),
      sharpe:S.backtestResult.sharpe,
      dd:S.backtestResult.maxDD,
      return:S.backtestResult.totalReturn,
      trades:S.backtestResult.trades,
      ts:Date.now(),
      improved:improved
    };
    if(!S.experiments)S.experiments=[];
    S.experiments.push(exp);
    if(S.experiments.length>50)S.experiments.shift();
    saveState();
  }
}

function saveCurrentAsStrategy(){
  var nameEl=document.getElementById('strat-name');
  var name=nameEl&&nameEl.value.trim();
  if(!name){alert('Enter a strategy name');return;}
  var p=S.tunerParams;
  var bt=S.backtestResult;
  if(!S.strategies)S.strategies=[];
  S.strategies.push({
    id:'custom-'+Date.now(),
    name:name,
    desc:'Custom strategy — RSI'+p.rsiPeriod+', ATR'+p.atrMult+'x, '+p.minVotes+'/6 votes',
    params:Object.assign({},p),
    source:'Tuner '+new Date().toLocaleDateString(),
    sharpe:bt?bt.sharpe:null,
    dd:bt?bt.maxDD:null,
    trades:bt?bt.trades:null,
    locked:false
  });
  if(nameEl)nameEl.value='';
  saveState();
  setPage('strategies');
}

function reloadExperiment(idx){
  var exps=(S.experiments||[]).slice().reverse();
  var exp=exps[idx];
  if(!exp)return;
  S.tunerParams=Object.assign({},exp.params);
  saveState();renderPage();
}

// ── Auto-Research Page (Karpathy Pattern) ─────────────────
function buildAutoResearchPage(){
  var experiments=S.experiments||[];
  var bestExp=experiments.length?experiments.reduce(function(best,e){
    return parseFloat(e.sharpe)>parseFloat(best.sharpe)?e:best;
  },experiments[0]):null;

  var html='<div class="card"><div class="ctitle">Auto-Research Loop <span style="color:var(--text3);font-size:9px;margin-left:6px">Karpathy pattern — autonomous strategy improvement</span></div>'
    +'<div style="font-size:11px;color:var(--text2);margin-bottom:12px">Inspired by Nunchi\'s 103-experiment loop. Claude proposes parameter modifications, tests them, keeps improvements, reverts failures. Each iteration is one autonomous experiment.</div>';

  // How it works
  html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:14px">'
    +'<div style="font-size:10px;color:var(--text2);letter-spacing:.1em;margin-bottom:10px">HOW IT WORKS</div>'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:10px">';
  ['READ current strategy + score','PROPOSE one parameter change via LLM','BACKTEST new params','KEEP if Sharpe improved','REVERT if not','REPEAT'].forEach(function(step,i){
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--text2)">'+(i+1)+'. '+step+'</div>';
    if(i<5)html+='<span style="color:var(--text3)">&#x2192;</span>';
  });
  html+='</div></div>';

  // Current best
  if(bestExp){
    html+='<div style="background:color-mix(in srgb,var(--green) 5%,var(--bg));border:1px solid color-mix(in srgb,var(--green) 25%,var(--border));border-radius:9px;padding:12px;margin-bottom:12px">'
      +'<div style="font-size:9px;color:var(--text3);letter-spacing:.1em;margin-bottom:6px">CURRENT BEST (your experiments)</div>'
      +'<div style="display:flex;align-items:center;gap:12px">'
      +'<div><div style="color:var(--green);font-family:var(--display);font-size:20px">'+bestExp.sharpe+'</div><div style="font-size:9px;color:var(--text3)">Sharpe</div></div>'
      +'<div><div style="color:var(--yellow);font-family:var(--display);font-size:16px">'+bestExp.dd+'%</div><div style="font-size:9px;color:var(--text3)">Max DD</div></div>'
      +'<div style="flex:1"><div style="color:var(--text2);font-size:11px">'+esc(bestExp.name)+'</div><div style="font-size:9px;color:var(--text3)">'+new Date(bestExp.ts).toLocaleDateString()+'</div></div>'
      +'<button class="btn btn-g btn-s" onclick="reloadBestExperiment()">LOAD</button>'
      +'</div></div>';
  }

  // Start loop
  html+='<div class="irow">'
    +'<button class="btn btn-g" onclick="runAutoResearchCycle()"'+(S.autoResearchRunning?' disabled':'')+'>'
    +(S.autoResearchRunning?'<span class="spin"></span> RESEARCHING...':'&#x27F3; RUN ONE EXPERIMENT')+'</button>'
    +'<button class="btn btn-o" onclick="runAutoResearch5()"'+(S.autoResearchRunning?' disabled':'')+'>'
    +(S.autoResearchRunning?'':'&#x29BE; RUN 5 EXPERIMENTS')+'</button>'
    +'</div>';

  // Experiment table
  if(experiments.length){
    html+='<div style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="font-size:10px;color:var(--text2);letter-spacing:.1em">EXPERIMENT LOG ('+experiments.length+' total)</div>'
      +'<button class="btn btn-o btn-s" onclick="S.experiments=[];saveState();renderPage()">CLEAR</button>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px">';
    experiments.slice().reverse().forEach(function(exp){
      var c=exp.improved?'var(--green)':'var(--text3)';
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-size:10px">'
        +'<span style="color:'+c+';font-size:12px">'+(exp.improved?'&#x25B2;':'&#x25BC;')+'</span>'
        +'<span style="color:var(--text2);flex:1">'+esc(exp.name)+'</span>'
        +'<span style="color:var(--purple)">&#x3C3; '+exp.sharpe+'</span>'
        +'<span style="color:var(--yellow)">DD '+exp.dd+'%</span>'
        +'<span style="color:var(--blue)">'+exp.return+'%</span>'
        +'<span style="color:var(--text3)">'+exp.trades+' trades</span>'
        +'</div>';
    });
    html+='</div></div>';

    // Sharpe progression chart
    if(experiments.length>2){
      var sharpes=experiments.map(function(e){return parseFloat(e.sharpe)||0;});
      var maxS=Math.max.apply(null,sharpes)||1;
      var W=500,H=60,pad=8;
      var pts=sharpes.map(function(v,i){
        return{x:pad+(i/(sharpes.length-1||1))*(W-pad*2),y:pad+(1-v/maxS)*(H-pad*2)};
      });
      var pd='M'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' L');
      html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px">'
        +'<div style="font-size:9px;color:var(--text3);letter-spacing:.15em;margin-bottom:6px">SHARPE PROGRESSION ACROSS EXPERIMENTS</div>'
        +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:50px" preserveAspectRatio="none">'
        +'<defs><linearGradient id="arGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.02"/></linearGradient></defs>'
        +'<path d="'+pd+' L'+(W-pad)+','+(H-pad)+' L'+pad+','+(H-pad)+' Z" fill="url(#arGrad)"/>'
        +'<path d="'+pd+'" fill="none" stroke="#a78bfa" stroke-width="2"/>'
        +'</svg>'
        +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:4px">'
        +'<span>Exp 1: '+sharpes[0].toFixed(1)+'</span>'
        +'<span style="color:var(--purple)">Best: '+Math.max.apply(null,sharpes).toFixed(1)+'</span>'
        +'<span>Latest: '+sharpes[sharpes.length-1].toFixed(1)+'</span>'
        +'</div></div>';
    }
  }else{
    html+='<div class="em" style="margin-top:12px">No experiments yet. Run your first experiment above.</div>';
  }
  html+='</div>';
  return html;
}

async function runAutoResearchCycle(){
  if(S.autoResearchRunning)return;
  S.autoResearchRunning=true;renderPage();

  try{
    var currentParams=Object.assign({},S.tunerParams);
    var experiments=S.experiments||[];
    var currentSharpe=experiments.length?
      parseFloat(experiments[experiments.length-1].sharpe)||2.7:2.7;

    // Ask Claude to propose a parameter change
    var expContext='Current best Sharpe: '+currentSharpe+'\n'+
      'Current params: RSI period '+currentParams.rsiPeriod+
      ', ATR mult '+currentParams.atrMult+
      ', min votes '+currentParams.minVotes+'/6'+
      ', position '+currentParams.posPct+'%'+
      ', cooldown '+currentParams.cooldown+' bars\n\n';

    if(experiments.length){
      expContext+='Recent experiments:\n'+
        experiments.slice(-5).map(function(e){
          return (e.improved?'KEPT':'REVERTED')+' — '+e.name+' → Sharpe '+e.sharpe;
        }).join('\n');
    }

    var proposal='';
    if(S.key&&S.key!=='demo'){
      try{
        var r=await fetch('/api/chat',{method:'POST',
          headers:{'Content-Type':'application/json','X-API-Key':S.key},
          body:JSON.stringify({
            model:'claude-sonnet-4.6',max_tokens:300,
            messages:[{
              role:'system',
              content:'You are an autonomous trading strategy optimizer. The Nunchi 6-signal strategy uses: RSI period (4-20), ATR multiplier (2-9), min votes (2-6), position size (2-20%), cooldown bars (0-6). Key insight: RSI period 8 was the biggest single improvement. Removing complexity consistently helped.'
            },{
              role:'user',
              content:expContext+'Propose ONE specific parameter change that might improve Sharpe. Return ONLY valid JSON: {"param":"rsiPeriod","value":8,"reasoning":"one sentence"}'
            }]
          })
        });
        if(r.ok){
          var d=await r.json();
          var txt=d.choices&&d.choices[0]?d.choices[0].message.content:'';
          var m=txt.match(/\{[^}]+\}/);
          if(m){var prop=JSON.parse(m[0]);proposal=prop;}
        }
      }catch(e){}
    }

    // Fallback: random perturbation if no LLM
    if(!proposal){
      var paramNames=['rsiPeriod','atrMult','minVotes','cooldown'];
      var paramRanges={rsiPeriod:[4,16,1],atrMult:[2,8,0.5],minVotes:[2,6,1],cooldown:[0,5,1]};
      var pick=paramNames[Math.floor(Math.random()*paramNames.length)];
      var range=paramRanges[pick];
      var delta=(Math.random()<0.5?-1:1)*range[2];
      var newVal=Math.min(range[1],Math.max(range[0],currentParams[pick]+delta));
      proposal={param:pick,value:newVal,reasoning:'Random perturbation'};
    }

    // Apply proposed change
    var newParams=Object.assign({},currentParams);
    if(proposal.param&&proposal.value!==undefined){
      newParams[proposal.param]=proposal.value;
    }

    // Run backtest with new params
    S.tunerParams=newParams;
    await runBacktest();

    var newSharpe=S.backtestResult&&!S.backtestResult.error?
      parseFloat(S.backtestResult.sharpe)||0:0;
    var improved=newSharpe>currentSharpe;

    var expName=proposal.param?
      proposal.param+'='+proposal.value+' ('+proposal.reasoning+')':
      'Random experiment';

    // Record experiment
    if(!S.experiments)S.experiments=[];
    S.experiments.push({
      id:'exp-'+Date.now(),
      name:expName,
      params:Object.assign({},newParams),
      sharpe:S.backtestResult?S.backtestResult.sharpe:'0',
      dd:S.backtestResult?S.backtestResult.maxDD:'0',
      return:S.backtestResult?S.backtestResult.totalReturn:'0',
      trades:S.backtestResult?S.backtestResult.trades:0,
      ts:Date.now(),
      improved:improved,
      proposal:proposal
    });
    if(S.experiments.length>50)S.experiments.shift();

    // Keep or revert
    if(improved){
      // Keep new params
      saveState();
    }else{
      // Revert
      S.tunerParams=currentParams;
      saveState();
    }

  }catch(e){
    S.autoResearchRunning=false;
  }

  S.autoResearchRunning=false;
  saveState();
  setPage('research');
}

async function runAutoResearch5(){
  for(var i=0;i<5;i++){
    await runAutoResearchCycle();
    await new Promise(function(r){setTimeout(r,500);});
  }
}

function reloadBestExperiment(){
  var experiments=S.experiments||[];
  if(!experiments.length)return;
  var best=experiments.reduce(function(b,e){
    return parseFloat(e.sharpe)>parseFloat(b.sharpe)?e:b;
  },experiments[0]);
  S.tunerParams=Object.assign({},best.params);
  saveState();
  setPage('tuner');
}

// ── Markdown Renderer ────────────────────────────────────
function renderMd(text){
  if(!text)return '';
  var h=text
    // code blocks
    .replace(/```([\s\S]*?)```/g,function(_,c){return '<pre style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;font-size:10px;line-height:1.7;margin:8px 0">'+esc(c.trim())+'</pre>';})
    // inline code
    .replace(/`([^`]+)`/g,function(_,c){return '<code style="background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px">'+esc(c)+'</code>';})
    // h2/h3
    .replace(/^### (.+)$/gm,'<div style="font-family:var(--display);font-size:16px;letter-spacing:.04em;color:var(--text);margin:14px 0 6px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-family:var(--display);font-size:19px;letter-spacing:.04em;color:var(--green);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">$1</div>')
    .replace(/^# (.+)$/gm,'<div style="font-family:var(--display);font-size:22px;letter-spacing:.04em;color:var(--text);margin:16px 0 8px">$1</div>')
    // bold + italic
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    // tables (simple)
    .replace(/\|(.+)\|/g,function(row){
      var cells=row.split('|').filter(function(c){return c.trim();});
      var isHeader=false;
      return '<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border3,#0a1828)">'
        +cells.map(function(c){return '<span style="flex:1;font-size:11px;color:var(--text2)">'+c.trim()+'</span>';}).join('')
        +'</div>';
    })
    // horizontal rule
    .replace(/^---+$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:12px 0"/>')
    // bullet lists
    .replace(/^(\s*[-*+] .+)$/gm,function(_,item){
      var indent=item.match(/^\s*/)[0].length;
      var text2=item.replace(/^\s*[-*+] /,'');
      return '<div style="display:flex;gap:8px;padding:2px 0;padding-left:'+(indent*8)+'px"><span style="color:var(--green);flex-shrink:0">&#x25AA;</span><span style="font-size:11px;color:var(--text2)">'+text2+'</span></div>';
    })
    // numbered lists
    .replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:8px;padding:2px 0"><span style="color:var(--blue);flex-shrink:0;min-width:18px">$1.</span><span style="font-size:11px;color:var(--text2)">$2</span></div>')
    // [BRACKET] labels — highlight signal/status words
    .replace(/\[([A-Z][A-Z\s/\-]{0,20})\]/g,'<span style="color:var(--green);font-family:var(--display);font-size:12px;letter-spacing:.05em">[$1]</span>')
    // newlines → breaks (after all block elements)
    .replace(/\n/g,'<br>');
  // Fix double-breaks after block elements
  h=h.replace(/(<\/div>|<\/pre>|<hr[^>]*\/>)<br>/g,'$1');
  return '<div style="font-size:11px;line-height:1.9;color:var(--text2)">'+h+'</div>';
}

function buildCalcPage(){
  var defaultVol=500000;
  // Build sparkline points for the chart
  var vols=[1000,5000,10000,25000,50000,100000,250000,500000,750000,1000000];
  var maxCalls=vols[vols.length-1]*0.012*0.57/0.004;
  var svgW=500,svgH=80;
  var points=vols.map(function(v,i){
    var calls=v*0.012*0.57/0.004;
    return {x:(i/(vols.length-1))*svgW, y:svgH-(calls/maxCalls)*svgH};
  });
  var pathD='M'+points.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' L');
  var areaD=pathD+' L'+svgW+','+svgH+' L0,'+svgH+' Z';
  var chart='<svg viewBox="0 0 '+svgW+' '+svgH+'" style="width:100%;height:60px;margin:8px 0" preserveAspectRatio="none">'
    +'<defs><linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0.02"/></linearGradient></defs>'
    +'<path d="'+areaD+'" fill="url(#chartGrad)"/>'
    +'<path d="'+pathD+'" fill="none" stroke="#00ff88" stroke-width="2"/>'
    +'</svg>';

  return '<div class="card"><div class="ctitle">Fee Calculator <span style="color:var(--text3);font-size:9px;margin-left:6px">57% of 1.2% swap fee funds inference</span></div>'
    +'<div style="font-size:11px;color:var(--text2);margin-bottom:12px">Drag to see how token trading volume translates into self-funded AI inference calls.</div>'

    +'<div style="font-size:9px;color:var(--text3);margin:6px 0 2px;letter-spacing:.15em">INFERENCE CALLS / DAY (chart)</div>'
    +chart

async function triggerCron(){
  if(S.cronRunning)return;
  S.cronRunning=true;renderPage();
  try{
    var r=await fetch('/api/agent-loop',{method:'GET',headers:{'x-api-key':S.key||'demo'}});
    var d=await r.json();
    if(!S.cronLog)S.cronLog=[];
    S.cronLog.unshift({ok:d.status==='ok',cycle:d.cycle||1,ts:new Date().toLocaleTimeString(),
      results:d.results?d.results.filter(function(x){return x.status==='ok';}).map(function(x){return {name:x.name,action:x.action||'monitored'};}):[],
    });
    if(S.cronLog.length>10)S.cronLog.pop();
  }catch(e){if(!S.cronLog)S.cronLog=[];S.cronLog.unshift({ok:false,cycle:0,ts:new Date().toLocaleTimeString(),results:[]});}
  S.cronRunning=false;renderPage();
}




function downloadOutput(){
  if(!S.out)return;
  var a2=S.agent, m2=S.model;
  var filename='bankrOS-'+a2.id+'-'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.md';
  var header='# bankrOS — '+a2.label+'\n'
    +'**Model:** '+m2.label+'\n'
    +'**Time:** '+new Date().toLocaleString()+'\n'
    +'**Cost:** $'+S.stats.cost.toFixed(4)+'\n\n---\n\n';
  var blob=new Blob([header+S.out],{type:'text/markdown'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url;link.download=filename;
  document.body.appendChild(link);link.click();
  document.body.removeChild(link);URL.revokeObjectURL(url);
  var btn=document.getElementById('dlBtn');
  if(btn){btn.textContent='SAVED!';btn.style.color='var(--green)';setTimeout(function(){btn.textContent='\u2B73 SAVE';btn.style.color='';},2000);}
}

function computeSignals(eth, history){
  // Use last known prices from PRICE_CACHE history if available
  var h=history&&history.length>0?history:[eth];
  var n=h.length;

  // Signal 1: Momentum 12h
  var mom12=n>=12?((h[n-1]-h[n-12])/h[n-12]*100):0;
  var dynThresh=1.5;
  var s1={name:'MOMENTUM 12H',vote:mom12>dynThresh?'BULL':mom12<-dynThresh?'BEAR':'NEUTRAL',
    value:mom12.toFixed(2)+'%',detail:'thresh: '+dynThresh.toFixed(1)+'%'};

  // Signal 2: Micro-momentum 6h
  var mom6=n>=6?((h[n-1]-h[n-6])/h[n-6]*100):0;
  var s2={name:'MICRO-MOM 6H',vote:mom6>dynThresh*0.7?'BULL':mom6<-dynThresh*0.7?'BEAR':'NEUTRAL',
    value:mom6.toFixed(2)+'%',detail:'thresh: '+(dynThresh*0.7).toFixed(2)+'%'};

  // Signal 3: EMA crossover (7 vs 26)
  function ema(arr,p){var k=2/(p+1),e=arr[0];for(var i=1;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;}
  var ema7=n>=7?ema(h.slice(-Math.min(n,50)),7):eth;
  var ema26=n>=26?ema(h.slice(-Math.min(n,50)),26):eth;
  var s3={name:'EMA 7/26',vote:ema7>ema26?'BULL':ema7<ema26?'BEAR':'NEUTRAL',
    value:'E7:$'+ema7.toFixed(0),detail:'E26:$'+ema26.toFixed(0)};

  // Signal 4: RSI(8) — KEY DISCOVERY
  function rsi(arr,p){
    if(arr.length<p+1)return 50;
    var gains=0,losses=0;
    for(var i=arr.length-p;i<arr.length;i++){var d=arr[i]-arr[i-1];d>0?gains+=d:losses-=d;}
    var rs=(gains/p)/(losses/p||0.001);return 100-100/(1+rs);
  }
  var rsi8=rsi(h,8);
  var s4={name:'RSI(8) KEY',vote:rsi8>50?'BULL':rsi8<50?'BEAR':'NEUTRAL',
    value:'RSI: '+rsi8.toFixed(1),detail:rsi8>69?'EXIT LONG':rsi8<31?'EXIT SHORT':'hold zone'};

  // Signal 5: MACD(14,23,9)
  var macd12=n>=14?ema(h.slice(-40),14)-ema(h.slice(-40),23):0;
  var s5={name:'MACD 14/23',vote:macd12>0?'BULL':macd12<0?'BEAR':'NEUTRAL',
    value:'hist: '+(macd12>0?'+':'')+macd12.toFixed(1),detail:'threshold: 0'};

  // Signal 6: BB Compression
  function bbWidth(arr,p){
    if(arr.length<p)return 0;
    var sl=arr.slice(-p),mean=sl.reduce(function(a,b){return a+b;},0)/p;
    var std=Math.sqrt(sl.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/p);
    return std*2/mean*100;
  }
  var bbw=bbWidth(h,20);
  var bbwPct=n>=100?h.slice(-100).map(function(_,i,a){return bbWidth(a.slice(0,i+20),20);})
    .filter(function(x){return x>0;}):[bbw];
  var pct=bbwPct.length?bbwPct.filter(function(x){return x<=bbw;}).length/bbwPct.length*100:50;
  var s6={name:'BB COMPRESSION',vote:pct<85?'BULL':'NEUTRAL',
    value:'width: '+bbw.toFixed(2)+'%',detail:'pct: '+pct.toFixed(0)+'th (need <85)'};

  return [s1,s2,s3,s4,s5,s6];
}

function buildEquityPage(){
  var curve=S.equityCurve||[];
  var html='<div class="card"><div class="ctitle">Equity Curve <span style="color:var(--text3);font-size:9px;margin-left:6px">portfolio value over time</span>'+(S._equityIsDemo?'<span class="badge a-w" style="margin-left:8px;font-size:9px">DEMO DATA</span>':'')+' </div>';

      +'<div class="alert a-w" style="margin-top:10px">The equity curve updates after each agent run. Connect your wallet and run a few trading agents to see your portfolio value over time.</div>'
      +'<button class="btn btn-g" style="margin-top:10px" onclick="seedEquityCurve()">SEED DEMO DATA</button>';
    html+='</div>';
    return html;
  }

  var vals=curve.map(function(p){return p.val;});
  var first=vals[0],last=vals[vals.length-1];
  var peak=Math.max.apply(null,vals);
  var trough=Math.min.apply(null,vals.slice(vals.indexOf(peak)));
  var maxDD=peak>0?(peak-trough)/peak*100:0;
  var totalReturn=first>0?(last-first)/first*100:0;
  var days=curve.length>1?(curve[curve.length-1].ts-curve[0].ts)/86400000:1;
  var dailyRet=totalReturn/Math.max(days,1);
  var sharpe=dailyRet>0?(dailyRet/1.5*Math.sqrt(365)).toFixed(2):'N/A';

  // Stats row
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">';
  [
    {l:'Portfolio Value',v:'$'+last.toFixed(2),c:'var(--blue)'},
    {l:'Total Return',v:(totalReturn>=0?'+':'')+totalReturn.toFixed(2)+'%',c:totalReturn>=0?'var(--green)':'#f87171'},
    {l:'Max Drawdown',v:maxDD.toFixed(2)+'%',c:maxDD<5?'var(--green)':maxDD<15?'var(--yellow)':'#f87171'},
    {l:'Rolling Sharpe',v:sharpe,c:'var(--purple)'},
  ].forEach(function(s){
    html+='<div class="wc"><div class="wl">'+s.l+'</div><div class="wv" style="color:'+s.c+'">'+s.v+'</div></div>';
  });
  html+='</div>';

  // SVG Equity Curve Chart
  var W=560,H=120,pad=10;
  var minV=Math.min.apply(null,vals)*0.998;
  var maxV=Math.max.apply(null,vals)*1.002;
  var range=maxV-minV||1;
  var pts=vals.map(function(v,i){
    return {
      x:pad+(i/(vals.length-1||1))*(W-pad*2),
      y:pad+(1-(v-minV)/range)*(H-pad*2)
    };
  });
  var pathD='M'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' L');
  var areaD=pathD+' L'+(W-pad)+','+(H-pad)+' L'+pad+','+(H-pad)+' Z';
  var lineColor=totalReturn>=0?'#00ff88':'#f87171';

  html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:12px">'
    +'<div style="font-size:9px;color:var(--text3);letter-spacing:.15em;margin-bottom:8px">EQUITY CURVE &mdash; '+curve.length+' data points</div>'
    +'<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100px" preserveAspectRatio="none">'
    +'<defs><linearGradient id="eqGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+lineColor+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+lineColor+'" stop-opacity="0.02"/></linearGradient></defs>'
    +'<path d="'+areaD+'" fill="url(#eqGrad)"/>'
    +'<path d="'+pathD+'" fill="none" stroke="'+lineColor+'" stroke-width="2"/>'
    // Peak marker
    +'<circle cx="'+pts[vals.indexOf(peak)].x.toFixed(1)+'" cy="'+pts[vals.indexOf(peak)].y.toFixed(1)+'" r="3" fill="#f59e0b"/>'
    +'</svg>'
    +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:4px">'
    +'<span>$'+first.toFixed(0)+'</span><span style="color:#f59e0b">&#x25CF; peak $'+peak.toFixed(0)+'</span><span>$'+last.toFixed(0)+'</span></div></div>';

  // Drawdown highlight
  if(maxDD>0.1){
    html+='<div style="background:color-mix(in srgb,#f87171 8%,var(--bg));border:1px solid color-mix(in srgb,#f87171 30%,var(--border));border-radius:8px;padding:10px 12px;font-size:11px">'
      +'<span style="color:#f87171">Max drawdown: '+maxDD.toFixed(2)+'%</span>'
      +'<span style="color:var(--text3);font-size:10px;margin-left:10px">Nunchi target: &lt;0.3% &mdash; '+(maxDD<5?'within normal range':'consider reducing position size')+'</span>'
      +'</div>';
  }
  html+='</div>';
  return html;
}

function seedEquityCurve(){
  if(!confirm('This will load SIMULATED demo data — not your real portfolio. Existing equity data will be replaced. Continue?'))return;
  // Seed demo data based on Nunchi exp102 curve shape (DEMO ONLY)
  var base=10000,curve=[];
  var ts=Date.now()-86400000*14;
  for(var i=0;i<50;i++){
    var drift=0.003, noise=(Math.random()-0.45)*0.008;
    base*=(1+drift+noise);
    curve.push({ts:ts+i*86400000/3.5,val:base,cost:i*0.004,demo:true});
  }
  S.equityCurve=curve;
  S._equityIsDemo=true;
  saveState();renderPage();
}

// ── Position Tracker Page ─────────────────────────────────
function buildPositionsPage(){
  var positions=S.positions||[];
  var open=positions.filter(function(p){return p.status==='open';});
  var closed=positions.filter(function(p){return p.status==='closed';});

  var html='<div class="card"><div class="ctitle">Position Tracker <span style="color:var(--text3);font-size:9px;margin-left:6px">open positions with live P&L</span></div>';

  if(!open.length){
    html+='<div class="em">No open positions. Run the Trading agent to open a position.</div>'
      +'<div class="alert a-w" style="margin-top:8px">bankrOS detects entry signals from agent output and tracks positions automatically. You can also add positions manually below.</div>';
  }else{
    html+='<div style="font-size:10px;color:var(--text2);letter-spacing:.1em;margin-bottom:8px">OPEN POSITIONS ('+open.length+')</div>'
      +'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';
    open.forEach(function(pos,i){
      var current=PRICE_CACHE[pos.symbol]||pos.entry;
      var pnl=(current-pos.entry)/pos.entry*(pos.size||100);
      var pnlPct=(current-pos.entry)/pos.entry*100;
      var pnlColor=pnl>=0?'var(--green)':'#f87171';
      var stopDist=pos.entry>0?(pos.entry-pos.stopPrice)/pos.entry*100:0;

      html+='<div style="background:var(--bg);border:1px solid color-mix(in srgb,'+(pnl>=0?'var(--green)':'#f87171')+' 20%,var(--border));border-radius:10px;padding:12px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        +'<span style="font-size:13px;font-family:var(--display);color:var(--blue)">'+pos.symbol+'/USDC</span>'
        +'<span class="badge bok">LONG</span>'
        +'<span style="font-size:10px;color:var(--text3);margin-left:auto">'+new Date(pos.entryTs).toLocaleDateString()+'</span></div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:10px">'
        +'<div><div style="color:var(--text3)">Entry</div><div style="color:var(--text2)">$'+pos.entry.toFixed(2)+'</div></div>'
        +'<div><div style="color:var(--text3)">Current</div><div style="color:var(--blue)">$'+current.toFixed(2)+'</div></div>'
        +'<div><div style="color:var(--text3)">P&L</div><div style="color:'+pnlColor+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+' ('+pnlPct.toFixed(2)+'%)</div></div>'
        +'<div><div style="color:var(--text3)">Stop</div><div style="color:#f87171">$'+pos.stopPrice.toFixed(2)+' (-'+Math.abs(stopDist).toFixed(1)+'%)</div></div>'
        +'</div>'
        +'<div style="margin-top:10px;display:flex;gap:8px">'
        +'<button class="btn btn-o btn-s" onclick="closePosition('+i+')">CLOSE</button>'
        +'<button class="btn btn-o btn-s" onclick="updateStop('+i+')">UPDATE STOP</button>'
        +'<div style="margin-left:auto;font-size:10px;color:var(--text3)">Size: $'+pos.size+'</div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  // Manual position entry
  html+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:12px">'
    +'<div style="font-size:10px;color:var(--text2);letter-spacing:.1em;margin-bottom:8px">ADD POSITION MANUALLY</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">'
    +'<div class="fld"><label>Symbol</label><select class="sel" id="pos-sym"><option>ETH</option><option>BTC</option><option>SOL</option></select></div>'
    +'<div class="fld"><label>Entry Price $</label><input class="inp" id="pos-entry" placeholder="e.g. 3400"/></div>'
    +'<div class="fld"><label>Size (USDC)</label><input class="inp" id="pos-size" placeholder="e.g. 500"/></div>'
    +'</div>'
    +'<button class="btn btn-g btn-s" onclick="addPosition()">ADD POSITION</button></div>';

  // Closed positions
  if(closed.length){
    html+='<div style="font-size:10px;color:var(--text2);letter-spacing:.1em;margin-bottom:8px">CLOSED POSITIONS ('+closed.length+')</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px">';
    closed.slice(0,10).forEach(function(pos){
      var pnl=pos.closedPnl||0;
      html+='<div style="display:flex;gap:8px;align-items:center;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:10px">'
        +'<span style="color:var(--text2)">'+pos.symbol+'/USDC</span>'
        +'<span style="color:var(--text3)">entry: $'+pos.entry.toFixed(2)+'</span>'
        +'<span style="color:var(--text3)">exit: $'+(pos.exitPrice||0).toFixed(2)+'</span>'
        +'<span style="color:'+(pnl>=0?'var(--green)':'#f87171');html+='">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'</span>'
        +'<span style="color:var(--text3);margin-left:auto">'+new Date(pos.entryTs).toLocaleDateString()+'</span>'
        +'</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function addPosition(){
  var sym=document.getElementById('pos-sym');
  var entry=document.getElementById('pos-entry');
  var size=document.getElementById('pos-size');
  if(!sym||!entry||!entry.value)return;
  var ep=parseFloat(entry.value);
  if(isNaN(ep)||ep<=0)return;
  if(!S.positions)S.positions=[];
  S.positions.push({
    id:Date.now(),agentId:'manual',symbol:sym.value,
    entry:ep,entryTs:new Date().toISOString(),
    size:parseFloat(size&&size.value||100),
    stopPrice:ep*0.954,status:'open',pnl:0,cost:0
  });
  entry.value='';if(size)size.value='';
  saveState();renderPage();
}

function closePosition(idx){
  if(!S.positions||!S.positions[idx])return;
  var pos=S.positions[idx];
  var current=PRICE_CACHE[pos.symbol]||pos.entry;
  pos.closedPnl=(current-pos.entry)/pos.entry*(pos.size||100);
  pos.exitPrice=current;
  pos.status='closed';
  if(!S.pnlStats)S.pnlStats={totalPnl:0,totalInferenceCost:0,wins:0,losses:0,trades:0,rollingPnl:[]};
  S.pnlStats.totalPnl+=pos.closedPnl;
  S.pnlStats.trades++;
  if(pos.closedPnl>0)S.pnlStats.wins++;else S.pnlStats.losses++;
  saveState();renderPage();
}

function updateStop(idx){
  if(!S.positions||!S.positions[idx])return;
  var pos=S.positions[idx];
  var val=prompt('New stop price (must be below entry $'+pos.entry.toFixed(2)+'):',pos.stopPrice.toFixed(2));
  if(!val||!val.trim())return;
  var sp=parseFloat(val.replace(/[^0-9.]/g,''));
  if(isNaN(sp)||sp<=0){alert('Invalid price. Enter a positive number.');return;}
  if(sp>=pos.entry){alert('Stop price must be BELOW entry price ($'+pos.entry.toFixed(2)+').');return;}
  if(sp<pos.entry*0.5){alert('Stop price too low (>50% below entry). Check your input.');return;}
  S.positions[idx].stopPrice=sp;
  saveState();renderPage();
}
